{% extends "base.html" %}

{% block title %}Register - AquaScale{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass-card fade-in-up">
        <div class="auth-header">
            <div class="logo-circle">
                <i class="fa-solid fa-water"></i>
            </div>
            <h2>Create Account</h2>
            <p>Join the future of marine analysis</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Choose Username</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="Choose a unique username" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Create a strong password"
                        required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-glow">
                Register <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
