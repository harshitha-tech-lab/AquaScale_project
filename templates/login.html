{% extends "base.html" %}

{% block title %}Login - AquaScale{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass-card fade-in-up">
        <div class="auth-header">
            <div class="logo-circle">
                <i class="fa-solid fa-water"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to continue your analysis</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-glow">
                Sign In <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="auth-footer">
            <p>New to AquaScale? <a href="{{ url_for('register') }}">Create Account</a></p>
        </div>
    </div>
</div>
{% endblock %}
